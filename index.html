<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anduril ANZ — BD Intelligence System</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07090d; --bg2: #0d1117; --bg3: #111820; --bg4: #161e28;
  --border: #1e2a38; --border-bright: #2a3d52;
  --red: #c8372d; --red-dim: #7a1f1a; --red-faint: rgba(200,55,45,0.07);
  --amber: #d4840a; --amber-dim: #6b4205;
  --green: #1f7a4a; --green-bright: #27a863; --green-faint: rgba(39,168,99,0.08);
  --blue: #1a4f8a; --blue-bright: #2b78d4; --blue-faint: rgba(43,120,212,0.08);
  --cyan: #0e9ea6; --cyan-faint: rgba(14,158,166,0.08);
  --text: #c8d4e0; --text-dim: #5a6b7a; --text-mid: #8a9daf;
  --gold: #c8aa3a; --gold-dim: #5a4a10;
  --purple: #6a3a9a; --purple-bright: #9a5ad4;
  --teal: #0d7a6a; --teal-bright: #14b89a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; font-size:14px; line-height:1.5; min-height:100vh; }
.header { background:var(--bg2); border-bottom:1px solid var(--red); padding:14px 28px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.logo { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:700; letter-spacing:3px; color:#fff; text-transform:uppercase; }
.logo span { color:var(--red); }
.header-tag { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text-dim); letter-spacing:1px; border:1px solid var(--border); padding:2px 8px; border-radius:2px; margin-left:14px; }
.header-right { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text-dim); text-align:right; }
.header-right span { color:var(--green-bright); }
.layout { display:grid; grid-template-columns:260px 1fr; height:calc(100vh - 51px); overflow:hidden; }
.sidebar { background:var(--bg2); border-right:1px solid var(--border); overflow-y:auto; }
.sidebar-section { padding:14px; border-bottom:1px solid var(--border); }
.sidebar-title { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; margin-bottom:8px; }
.product-btn { display:block; width:100%; text-align:left; background:transparent; border:1px solid transparent; border-radius:3px; padding:7px 9px; margin-bottom:3px; cursor:pointer; transition:all 0.15s; color:var(--text-mid); }
.product-btn:hover { border-color:var(--border-bright); background:var(--bg3); color:var(--text); }
.product-btn.active { border-color:var(--red); background:var(--red-faint); color:#fff; }
.pname { font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:13px; letter-spacing:0.5px; display:block; }
.pcategory { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--text-dim); margin-top:1px; display:block; }
.product-btn.active .pcategory { color:var(--red-dim); }
.status-dot { display:inline-block; width:5px; height:5px; border-radius:50%; margin-right:5px; vertical-align:middle; }
.dot-contracted { background:var(--green-bright); }
.dot-active { background:var(--blue-bright); }
.dot-pitched { background:var(--amber); }
.dot-potential { background:var(--text-dim); }
.legend { padding:10px 14px; }
.legend-title { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; margin-bottom:6px; }
.legend-row { display:flex; align-items:center; gap:7px; margin-bottom:4px; font-size:11px; color:var(--text-dim); }
.main { overflow-y:auto; padding:24px 28px; background:var(--bg); }
.product-header { display:grid; grid-template-columns:1fr auto; gap:20px; margin-bottom:20px; padding-bottom:20px; border-bottom:1px solid var(--border); }
.product-name { font-family:'Barlow Condensed',sans-serif; font-size:32px; font-weight:700; letter-spacing:1px; color:#fff; line-height:1; margin-bottom:5px; }
.product-name .hl { color:var(--red); }
.product-subtitle { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text-dim); letter-spacing:1px; text-transform:uppercase; }
.product-status-badge { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1px; padding:3px 10px; border-radius:2px; text-transform:uppercase; white-space:nowrap; align-self:flex-start; margin-top:6px; }
.badge-contracted { background:rgba(39,168,99,0.1); border:1px solid var(--green-bright); color:var(--green-bright); }
.badge-active { background:var(--blue-faint); border:1px solid var(--blue-bright); color:var(--blue-bright); }
.badge-pitched { background:rgba(212,132,10,0.1); border:1px solid var(--amber); color:var(--amber); }
.badge-potential { background:rgba(90,107,122,0.1); border:1px solid var(--text-dim); color:var(--text-dim); }
.tabs { display:flex; border-bottom:1px solid var(--border); margin-bottom:20px; overflow-x:auto; }
.tab-btn { background:transparent; border:none; border-bottom:2px solid transparent; padding:9px 14px; font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:12px; letter-spacing:1px; color:var(--text-dim); cursor:pointer; text-transform:uppercase; transition:all 0.15s; margin-bottom:-1px; white-space:nowrap; }
.tab-btn:hover { color:var(--text); }
.tab-btn.active { color:#fff; border-bottom-color:var(--red); }
.tab-panel { display:none; }
.tab-panel.active { display:block; }
.section-label { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; margin-bottom:8px; margin-top:20px; }
.section-label:first-child { margin-top:0; }
p { color:var(--text-mid); font-size:13px; line-height:1.65; margin-bottom:12px; }
p strong { color:var(--text); font-weight:600; }
.iip-grid { display:grid; gap:8px; }
.iip-row { background:var(--bg2); border:1px solid var(--border); border-radius:3px; padding:12px 14px; display:grid; grid-template-columns:210px 1fr auto; gap:14px; align-items:start; }
.iip-row:hover { border-color:var(--border-bright); }
.iip-row.primary { border-left:3px solid var(--red); }
.iip-row.secondary { border-left:3px solid var(--blue-bright); }
.iip-row.tertiary { border-left:3px solid var(--text-dim); }
.iip-chapter { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--text-dim); margin-bottom:2px; }
.iip-name { font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:13px; color:var(--text); }
.iip-budget { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--gold); margin-top:2px; }
.iip-desc { font-size:12px; color:var(--text-dim); line-height:1.5; }
.iip-fit { font-family:'Share Tech Mono',monospace; font-size:9px; padding:3px 7px; border-radius:2px; white-space:nowrap; text-transform:uppercase; }
.fit-primary { background:rgba(200,55,45,0.1); border:1px solid var(--red-dim); color:var(--red); }
.fit-secondary { background:var(--blue-faint); border:1px solid var(--blue); color:var(--blue-bright); }
.fit-tertiary { background:rgba(90,107,122,0.08); border:1px solid var(--border); color:var(--text-dim); }
.fit-pitched { background:rgba(212,132,10,0.08); border:1px solid var(--amber-dim); color:var(--amber); }
.specs-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
.spec-card { background:var(--bg2); border:1px solid var(--border); border-radius:3px; padding:10px 12px; }
.spec-label { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1px; color:var(--text-dim); text-transform:uppercase; margin-bottom:4px; }
.spec-value { font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:14px; color:var(--text); }
.bd-card { background:var(--red-faint); border:1px solid rgba(200,55,45,0.2); border-radius:3px; padding:16px 18px; margin-bottom:14px; }
.bd-card-title { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:12px; letter-spacing:1px; color:var(--red); text-transform:uppercase; margin-bottom:6px; }
.bd-list { list-style:none; }
.bd-list li { font-size:12px; color:var(--text-mid); padding:4px 0 4px 14px; position:relative; border-bottom:1px solid rgba(30,42,56,0.5); line-height:1.5; }
.bd-list li:last-child { border-bottom:none; }
.bd-list li::before { content:'→'; position:absolute; left:0; color:var(--red); font-size:10px; top:5px; }
.alert { background:rgba(212,132,10,0.06); border:1px solid rgba(212,132,10,0.25); border-radius:3px; padding:10px 12px; font-size:12px; color:var(--text-dim); margin-bottom:14px; }
.alert strong { color:var(--amber); }
.tender-doc { background:var(--bg2); border:1px solid var(--border); border-radius:4px; overflow:hidden; }
.tender-header { background:var(--bg3); border-bottom:1px solid var(--border); padding:14px 18px; display:grid; grid-template-columns:1fr auto; align-items:start; }
.tender-ref { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--text-dim); margin-bottom:3px; }
.tender-title { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:16px; color:#fff; }
.tender-meta { text-align:right; }
.tender-type { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--blue-bright); border:1px solid var(--blue); padding:2px 8px; border-radius:2px; margin-bottom:4px; display:inline-block; }
.tender-value { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--gold); }
.tender-body { padding:18px; }
.tender-section { margin-bottom:16px; }
.tender-section-label { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:2px; color:var(--red); text-transform:uppercase; margin-bottom:6px; padding-bottom:4px; border-bottom:1px solid rgba(200,55,45,0.2); }
.tender-text { font-size:12px; color:var(--text-mid); line-height:1.65; }
.tender-list { list-style:none; }
.tender-list li { font-size:12px; color:var(--text-mid); padding:3px 0 3px 14px; position:relative; }
.tender-list li::before { content:'▸'; position:absolute; left:0; color:var(--blue-bright); font-size:9px; top:4px; }
.tender-compliance { display:flex; flex-wrap:wrap; gap:6px; }
.compliance-tag { font-family:'Share Tech Mono',monospace; font-size:9px; padding:3px 8px; background:var(--green-faint); border:1px solid rgba(39,168,99,0.3); color:var(--green-bright); border-radius:2px; }
.kanban-board { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; min-height:300px; }
.kanban-col { background:var(--bg2); border:1px solid var(--border); border-radius:4px; overflow:hidden; }
.kanban-col-header { padding:8px 10px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.kanban-col-title { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1px; text-transform:uppercase; font-weight:600; }
.kc-identify .kanban-col-title { color:var(--blue-bright); }
.kc-qualify .kanban-col-title { color:var(--cyan); }
.kc-shape .kanban-col-title { color:var(--amber); }
.kc-bid .kanban-col-title { color:var(--red); }
.kc-award .kanban-col-title { color:var(--green-bright); }
.kanban-count { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--text-dim); background:var(--bg3); padding:1px 6px; border-radius:10px; }
.kanban-cards { padding:8px; display:flex; flex-direction:column; gap:6px; }
.kanban-card { background:var(--bg3); border:1px solid var(--border); border-radius:3px; padding:8px 10px; cursor:default; transition:border-color 0.15s; }
.kanban-card:hover { border-color:var(--border-bright); }
.kc-identify .kanban-card { border-left:2px solid var(--blue-bright); }
.kc-qualify .kanban-card { border-left:2px solid var(--cyan); }
.kc-shape .kanban-card { border-left:2px solid var(--amber); }
.kc-bid .kanban-card { border-left:2px solid var(--red); }
.kc-award .kanban-card.won { border-left:2px solid var(--green-bright); background:var(--green-faint); }
.kc-award .kanban-card.lost { border-left:2px solid var(--red-dim); background:var(--red-faint); }
.kc-award .kanban-card.pending { border-left:2px solid var(--text-dim); }
.kcard-title { font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:12px; color:var(--text); line-height:1.3; margin-bottom:4px; }
.kcard-meta { display:flex; align-items:center; gap:5px; flex-wrap:wrap; margin-top:4px; }
.kcard-owner { font-family:'Share Tech Mono',monospace; font-size:8px; color:var(--text-dim); background:var(--bg2); padding:1px 5px; border-radius:2px; }
.kcard-priority { font-family:'Share Tech Mono',monospace; font-size:8px; padding:1px 5px; border-radius:2px; }
.priority-high { background:rgba(200,55,45,0.1); border:1px solid var(--red-dim); color:var(--red); }
.priority-med { background:rgba(212,132,10,0.1); border:1px solid var(--amber-dim); color:var(--amber); }
.priority-low { background:rgba(90,107,122,0.08); color:var(--text-dim); border:1px solid var(--border); }
.kcard-note { font-size:10px; color:var(--text-dim); margin-top:3px; line-height:1.4; }
.kcard-due { font-family:'Share Tech Mono',monospace; font-size:8px; color:var(--text-dim); margin-top:4px; }
.timeline-wrapper { background:var(--bg2); border:1px solid var(--border); border-radius:4px; overflow:hidden; }
.timeline-header-row { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border-bottom:1px solid var(--border); background:var(--bg3); }
.timeline-title-lg { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:14px; color:#fff; }
.timeline-target-badge { font-family:'Share Tech Mono',monospace; font-size:9px; padding:2px 8px; border-radius:2px; background:var(--green-faint); border:1px solid rgba(39,168,99,0.3); color:var(--green-bright); }
.timeline-body { padding:14px; }
.timeline-week-labels { display:flex; margin-bottom:6px; margin-left:130px; }
.timeline-week-label { font-family:'Share Tech Mono',monospace; font-size:8px; color:var(--text-dim); text-align:center; flex:1; }
.timeline-row { display:flex; align-items:center; margin-bottom:6px; }
.timeline-phase-label { width:130px; flex-shrink:0; font-size:11px; color:var(--text-mid); padding-right:10px; font-family:'Barlow Condensed',sans-serif; font-weight:600; }
.timeline-track { flex:1; position:relative; height:20px; background:var(--bg3); border-radius:2px; }
.timeline-bar { position:absolute; top:3px; height:14px; border-radius:2px; display:flex; align-items:center; padding:0 4px; }
.timeline-bar span { font-family:'Share Tech Mono',monospace; font-size:7px; color:rgba(255,255,255,0.6); white-space:nowrap; overflow:hidden; }
.timeline-target-line { position:absolute; top:0; width:2px; height:100%; background:rgba(200,55,45,0.5); z-index:10; }
.target-line-label { font-family:'Share Tech Mono',monospace; font-size:7px; color:var(--red); white-space:nowrap; position:absolute; top:-14px; left:-10px; }
.timeline-legend { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
.tl-legend-item { display:flex; align-items:center; gap:5px; font-size:10px; color:var(--text-dim); }
.tl-legend-dot { width:10px; height:10px; border-radius:2px; }
.timeline-milestones-list { margin-top:12px; display:flex; flex-direction:column; gap:4px; }
.milestone-item { display:flex; align-items:center; gap:10px; font-size:11px; color:var(--text-dim); }
.milestone-week-tag { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--gold); width:50px; flex-shrink:0; }
.overview-table { width:100%; border-collapse:collapse; margin-bottom:16px; }
.overview-table th { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1px; color:var(--text-dim); text-transform:uppercase; text-align:left; padding:7px 10px; border-bottom:1px solid var(--border); background:var(--bg2); }
.overview-table td { padding:9px 10px; border-bottom:1px solid rgba(30,42,56,0.4); vertical-align:middle; }
.overview-table tr:hover td { background:rgba(13,17,23,0.4); }
.pn-link { font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:13px; color:var(--text); cursor:pointer; }
.pn-link:hover { color:var(--red); }
.tam-funnel { display:flex; flex-direction:column; gap:6px; margin-bottom:24px; }
.tam-tier { display:flex; align-items:center; gap:12px; }
.tam-bar-wrap { flex:1; position:relative; height:34px; background:var(--bg3); border-radius:3px; overflow:hidden; }
.tam-bar-fill { height:100%; border-radius:3px; display:flex; align-items:center; padding:0 12px; transition:width 0.5s; }
.tam-bar-label { font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:13px; color:#fff; white-space:nowrap; }
.tam-tier-meta { width:180px; flex-shrink:0; text-align:right; }
.tam-tier-name { font-size:11px; color:var(--text-mid); margin-bottom:1px; }
.tam-tier-value { font-family:'Share Tech Mono',monospace; font-size:12px; color:var(--gold); }
.tam-segments { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:24px; }
.tam-segment-card { background:var(--bg2); border:1px solid var(--border); border-radius:4px; padding:14px; }
.tam-seg-name { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:14px; color:var(--text); margin-bottom:3px; }
.tam-seg-total { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text-dim); margin-bottom:8px; }
.tam-seg-bar-wrap { height:8px; background:var(--bg3); border-radius:4px; margin-bottom:4px; }
.tam-seg-bar { height:8px; border-radius:4px; background:var(--red); }
.tam-seg-share { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--gold); }
.tam-headline { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:24px; }
.tam-headline-card { background:var(--bg2); border:1px solid var(--border); border-radius:4px; padding:16px; text-align:center; }
.tam-headline-val { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:28px; color:#fff; margin-bottom:3px; }
.tam-headline-val .c { color:var(--red); }
.tam-headline-sub { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; }
.tam-headline-note { font-size:11px; color:var(--text-dim); margin-top:4px; }
.gtm-pillars { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:24px; }
.gtm-pillar { background:var(--bg2); border:1px solid var(--border); border-radius:4px; padding:16px; border-left:3px solid var(--red); }
.gtm-pillar-num { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--red); letter-spacing:2px; margin-bottom:5px; }
.gtm-pillar-title { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:16px; color:#fff; margin-bottom:6px; }
.gtm-pillar-body { font-size:12px; color:var(--text-dim); line-height:1.55; }
.gtm-pillar-kpi { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--amber); margin-top:8px; }
.gtm-tiers { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:24px; }
.gtm-tier-card { background:var(--bg2); border:1px solid var(--border); border-radius:4px; overflow:hidden; }
.gtm-tier-header { padding:8px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.gtm-tier-title { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:13px; }
.gtm-tier-label { font-family:'Share Tech Mono',monospace; font-size:8px; padding:2px 7px; border-radius:2px; }
.tier1 .gtm-tier-header { background:rgba(200,55,45,0.07); }
.tier1 .gtm-tier-title { color:var(--red); }
.tier1 .gtm-tier-label { background:rgba(200,55,45,0.1); border:1px solid var(--red-dim); color:var(--red); }
.tier2 .gtm-tier-header { background:var(--blue-faint); }
.tier2 .gtm-tier-title { color:var(--blue-bright); }
.tier2 .gtm-tier-label { background:var(--blue-faint); border:1px solid var(--blue); color:var(--blue-bright); }
.tier3 .gtm-tier-header { background:rgba(90,107,122,0.06); }
.tier3 .gtm-tier-title { color:var(--text-mid); }
.tier3 .gtm-tier-label { background:rgba(90,107,122,0.1); border:1px solid var(--border); color:var(--text-dim); }
.gtm-tier-contacts { padding:8px 12px; }
.gtm-contact { font-size:11px; color:var(--text-mid); padding:3px 0; border-bottom:1px solid rgba(30,42,56,0.4); }
.gtm-contact:last-child { border-bottom:none; }
.gtm-contact span { font-size:10px; color:var(--text-dim); display:block; }
.plan-cols { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:24px; }
.plan-col { background:var(--bg2); border:1px solid var(--border); border-radius:4px; overflow:hidden; }
.plan-col-header { padding:8px 12px; border-bottom:1px solid var(--border); text-align:center; }
.plan-col-days { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:20px; }
.plan-col-sub { font-family:'Share Tech Mono',monospace; font-size:8px; color:var(--text-dim); text-transform:uppercase; }
.d30 .plan-col-days { color:var(--blue-bright); }
.d60 .plan-col-days { color:var(--amber); }
.d90 .plan-col-days { color:var(--green-bright); }
.plan-items { padding:10px 12px; }
.plan-item { font-size:11px; color:var(--text-dim); padding:4px 0 4px 12px; position:relative; border-bottom:1px solid rgba(30,42,56,0.3); line-height:1.45; }
.plan-item:last-child { border-bottom:none; }
.plan-item::before { content:'▸'; position:absolute; left:0; font-size:8px; color:var(--red); top:5px; }
.capture-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-bottom:24px; }
.capture-stage { background:var(--bg2); border:1px solid var(--border); border-radius:3px; padding:12px 10px; text-align:center; position:relative; }
.capture-stage::after { content:'→'; position:absolute; right:-10px; top:50%; transform:translateY(-50%); color:var(--text-dim); font-size:12px; z-index:2; }
.capture-stage:last-child::after { display:none; }
.cs-num { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--text-dim); margin-bottom:4px; }
.cs-name { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:13px; color:var(--text); margin-bottom:4px; }
.cs-prob { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--gold); margin-bottom:6px; }
.cs-gate { font-size:10px; color:var(--text-dim); line-height:1.4; }
.kpi-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.kpi-card { background:var(--bg2); border:1px solid var(--border); border-radius:3px; padding:12px; }
.kpi-label { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
.kpi-value { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:20px; color:#fff; margin-bottom:2px; }
.kpi-value .c { color:var(--red); }
.kpi-note { font-size:10px; color:var(--text-dim); }
.scrollbar::-webkit-scrollbar { width:4px; }
.scrollbar::-webkit-scrollbar-track { background:var(--bg2); }
.scrollbar::-webkit-scrollbar-thumb { background:var(--border-bright); border-radius:2px; }
.view-btn { background:transparent; border:1px solid var(--border); border-radius:3px; padding:6px 9px; margin-bottom:3px; cursor:pointer; transition:all 0.15s; color:var(--text-dim); display:block; width:100%; text-align:left; }
.view-btn:hover { border-color:var(--border-bright); background:var(--bg3); color:var(--text); }
.view-btn.active { border-color:var(--gold); background:rgba(200,170,58,0.07); color:var(--gold); }
.view-btn.active .pname { color:var(--gold); }
.view-btn.active .pcategory { color:var(--gold-dim); }
</style>

var gtm={pillars:[{num:"01",title:"Generate & Capture",body:"Build a pipeline of qualified ANZ opportunities across Anduril's full product suite, grounded in deep knowledge of ADF programmatic roadmaps, buying cycles, and competitor positioning. Manage continuous engagement across CASG, ASCA, DST Group, service-level capability managers, and SOCI entities. Monitor AusTender weekly. Target A$1B+ qualified pipeline within 12 months.",kpi:"Year 1 target: A$1B+ qualified pipeline"},{num:"02",title:"Grow Existing Business",body:"Ghost Shark Phase 1 is the beachhead — A$1.7B contracted, delivered ahead of schedule. Partner with Operations to sustain that delivery performance, then move fast on shaping Phase 2. ASCA Mission 0 is a relationship, not just a contract — leverage it to position Lattice, Ghost UAS, and Roadrunner for Missions 1 through N.",kpi:"Year 1: Phase 2 ATM shaped and responded to. Year 2: 60% ARR growth"},{num:"03",title:"Communicate Value",body:"Represent Anduril as a defence technology company, not a prime contractor. Speak at LAND Forces, Indo-Pacific Forum, ACIF, and ADM events. Write for ASPI Strategist on autonomous systems. Build the public profile that makes the Anduril ANZ office the most visible tech defence company in the country.",kpi:"Target: 5+ speaking/publication engagements in Year 1"},{num:"04",title:"Inform Product Development",body:"Every ADF client conversation must feed back to Anduril's product and engineering teams within 48 hours. Translate ADF requirements into structured product briefs. Establish a quarterly ANZ product roadmap review with Anduril's global product leadership.",kpi:"Quarterly product brief cadence — 2 roadmap inputs per quarter minimum"}],tiers:[{cls:"tier1",title:"Tier 1 — Strategic Decision Makers",label:"ENGAGE IMMEDIATELY",contacts:[{name:"Adm David Johnston AC RAN — CDF",note:"Chief of Defence Force from Jul 2024. Focus: ADF rebuild, Indo-Pacific."},{name:"VADM Mark Hammond AO RAN — CN",note:"Chief of Navy. function renderProduct(id){var p=products[id];if(!p)return;var firstWord=p.name.split(' ')[0];var rest=p.name.substring(firstWord.length);var html='<div class="product-header"><div><div class="product-name"><span class="hl">'+firstWord+'</span>'+rest+'</div><div class="product-subtitle">'+p.subtitle+'</div></div><span class="product-status-badge badge-'+p.status+'">'+p.statusLabel+'</span></div>';html+='<div class="tabs" id="ptabs">';var tns=['overview','iip','bd','tender','actions','timeline'];var tls=['Overview','IIP Mapping','BD Angles','Tender','Actions','Timeline'];tns.forEach(function(t,i){html+='<button class="tab-btn'+(i===0?' active':'')+'" onclick="switchTab(\''+t+'\')">'+tls[i]+'</button>';});html+='</div>';tns.forEach(function(t,i){html+='<div id="tab-'+t+'" class="tab-panel'+(i===0?' active':'')+'">'+buildTabContent(id,t)+'</div>';});document.getElementById('main').innerHTML=html;}

function buildTimelineTab(p){var tl=p.timeline;var totalWks=tl.totalWeeks;var weekLabels='';for(var w=0;w<=totalWks;w+=4){weekLabels+='<div class="timeline-week-label" style="width:'+(4/totalWks*100)+'%">W'+w+'</div>';}var h='<div class="timeline-wrapper"><div class="timeline-header-row"><span class="timeline-title-lg">Program Timeline — '+p.name+'</span><span class="timeline-target-badge">TARGET: W'+tl.targetWeek+' — AHEAD OF SCHEDULE</span></div><div class="timeline-body"><div class="timeline-week-labels">'+weekLabels+'</div>';tl.phases.forEach(function(phase){var lp=(phase.start/totalWks*100).toFixed(1)+'%';var wp=((phase.end-phase.start)/totalWks*100).toFixed(1)+'%';var tl2=(tl.targetWeek/totalWks*100).toFixed(1)+'%';h+='<div class="timeline-row"><div class="timeline-phase-label">'+phase.name+'</div><div class="timeline-track"><div class="timeline-target-line" style="left:'+tl2+'"><span class="target-line-label">TARGET</span></div><div class="timeline-bar" style="left:'+lp+';width:'+wp+';background:'+phase.color+';opacity:0.75"><span>'+phase.name+'</span></div></div></div>';});h+='<div class="timeline-milestones-list">';tl.milestones.forEach(function(m){h+='<div class="milestone-item"><span class="milestone-week-tag">WEEK '+m.week+'</span><span style="color:var(--text-dim)">◆ '+m.label+'</span></div>';});h+='</div><div class="timeline-legend" style="margin-top:12px">';tl.phases.forEach(function(ph){h+='<div class="tl-legend-item"><div class="tl-legend-dot" style="background:'+ph.color+';opacity:0.75"></div>'+ph.name+'</div>';});h+='</div></div></div>';return h;}

function jumpProduct(id){clearActive();var btns=document.querySelectorAll('.product-btn');btns.forEach(function(b){if(b.getAttribute('onclick')&&b.getAttribute('onclick').indexOf("'"+id+"'")>-1)b.classList.add('active');});renderProduct(id);}
function renderTAM(){var h='<div style="margin-bottom:18px"><div style="font-family:\'Barlow Condensed\',sans-serif;font-size:28px;font-weight:700;color:#fff;margin-bottom:4px">Total Addressable <span style="color:var(--red)">Market</span></div><div style="font-family:\'Share Tech Mono\',monospace;font-size:10px;color:var(--text-dim)">ANDURIL ANZ — IIP 2024–2034 MARKET SIZING &amp; PIPELINE</div></div>';h+='<div class="section-label">Market Funnel — from IIP Total to Contracted</div><div class="tam-funnel">';tam.funnel.forEach(function(tier){h+='<div class="tam-tier"><div class="tam-tier-meta"><div class="tam-tier-name">'+tier.name+'</div><div class="tam-tier-value">'+tier.value+'</div></div><div class="tam-bar-wrap"><div class="tam-bar-fill" style="width:'+tier.pct+'%;background:'+tier.color+'"><span class="tam-bar-label">'+tier.value+'</span></div></div></div>';});h+='</div>';h+='<div class="section-label">Pipeline Headline — ANZ</div><div class="tam-headline">';var hl=[{val:"A$1.9",c:"B",sub:"CONTRACTED — AU + NZDF ADJ.",note:"Ghost Shark Ph.1 + NZDF adjacent — live programs"},{val:"A$4–6",c:"B",sub:"NEAR-TERM PIPELINE FY26–FY29",note:"Qualified AU + NZ opportunities across product suite"},{val:"A$12–18",c:"B",sub:"ANZ DECADE ADDRESSABLE",note:"Direct Anduril addressable share of IIP 2024–2034"}];hl.forEach(function(item){h+='<div class="tam-headline-card"><div class="tam-headline-val">'+item.val+'<span class="c">'+item.c+'</span></div><div class="tam-headline-sub">'+item.sub+'</div><div class="tam-headline-note">'+item.note+'</div></div>';});h+='</div>';h+='<div class="section-label">Key Budget Reference Points</div><table class="overview-table" style="margin-bottom:20px"><thead><tr><th>Budget Line</th><th>Value</th><th>Context</th></tr></thead><tbody>';tam.budgetContext.forEach(function(b){h+='<tr><td style="font-family:\'Barlow Condensed\',sans-serif;font-weight:600;font-size:13px;color:var(--text)">'+b.label+'</td><td style="font-family:\'Share Tech Mono\',monospace;font-size:11px;color:var(--gold)">'+b.value+'</td><td style="font-size:11px;color:var(--text-dim)">'+b.note+'</td></tr>';});h+='</tbody></table>';h+='<div class="section-label">Addressable Market by Segment</div><div class="tam-segments">';tam.segments.forEach(function(seg){var sc=seg.status==='contracted'?'var(--green-bright)':seg.status==='active'?'var(--blue-bright)':seg.status==='pitched'?'var(--amber)':'var(--text-dim)';h+='<div class="tam-segment-card"><div class="tam-seg-name">'+seg.name+'</div><div class="tam-seg-total">IIP/DCP: '+seg.totalAddr+' &nbsp;|&nbsp; Anduril: '+seg.andurilShare+'</div><div style="font-size:10px;color:var(--text-dim);margin-bottom:6px">'+seg.products+'</div><div class="tam-seg-bar-wrap"><div class="tam-seg-bar" style="width:'+seg.sharePct+'%;background:'+sc+'"></div></div><div class="tam-seg-share">'+seg.andurilShare+' addressable &nbsp;·&nbsp; <span style="color:'+sc+'">'+seg.status.toUpperCase()+'</span></div><div style="font-size:10px;color:var(--text-dim);margin-top:3px">'+seg.iipLine+'</div></div>';});h+='</div>';h+='<div class="alert"><strong>METHODOLOGY:</strong> All figures are derived from publicly available IIP 2024 documentation, NDS 2024, NZDF DCP 2024, AusTender data, and public defence analysis. They represent the Anduril-addressable portion of each capability chapter based on product-line fit.</div>';document.getElementById('main').innerHTML=h;}
function renderGTM(){var h='<div style="margin-bottom:18px"><div style="font-family:\'Barlow Condensed\',sans-serif;font-size:28px;font-weight:700;color:#fff;margin-bottom:4px">Director <span style="color:var(--red)">GTM</span> Framework</div><div style="font-family:\'Share Tech Mono\',monospace;font-size:10px;color:var(--text-dim)">GO-TO-MARKET STRATEGY — ALIGNED TO ANDURIL BD DIRECTOR JD</div></div>';h+='<div class="section-label">Strategic Mandate — Four Pillars</div><div class="gtm-pillars">';gtm.pillars.forEach(function(p){h+='<div class="gtm-pillar"><div class="gtm-pillar-num">PILLAR '+p.num+'</div><div class="gtm-pillar-title">'+p.title+'</div><div class="gtm-pillar-body">'+p.body+'</div><div class="gtm-pillar-kpi">'+p.kpi+'</div></div>';});h+='</div>';h+='<div class="section-label">Capture Management Framework</div><div class="capture-grid">';gtm.capture.forEach(function(stage){h+='<div class="capture-stage"><div class="cs-num">GATE '+stage.num+'</div><div class="cs-name">'+stage.name+'</div><div class="cs-prob">'+stage.prob+' win prob.</div><div class="cs-gate">'+stage.gate+'</div></div>';});h+='</div>';h+='<div class="section-label">Client Ecosystem — Tier Map</div><div class="gtm-tiers">';gtm.tiers.forEach(function(tier){h+='<div class="gtm-tier-card '+tier.cls+'"><div class="gtm-tier-header"><span class="gtm-tier-title">'+tier.title+'</span><span class="gtm-tier-label">'+tier.label+'</span></div><div class="gtm-tier-contacts">';tier.contacts.forEach(function(c){h+='<div class="gtm-contact">'+c.name+'<span>'+c.note+'</span></div>';});h+='</div></div>';});h+='</div>';h+='<div class="section-label">30 / 60 / 90 Day Onboarding Plan</div><div class="plan-cols">';gtm.plan.forEach(function(col){h+='<div class="plan-col '+col.cls+'"><div class="plan-col-header"><div class="plan-col-days">'+col.days+'</div><div class="plan-col-sub">'+col.sub+'</div></div><div class="plan-items">';col.items.forEach(function(item){h+='<div class="plan-item">'+item+'</div>';});h+='</div></div>';});h+='</div>';h+='<div class="section-label">KPIs — Year 1 Targets</div><div class="kpi-grid">';gtm.kpis.forEach(function(k){var parts=k.value.match(/^([A-Z$]*)([\d,\.>+]+)(.*)/);var dv=parts?((parts[1]||'')+'<span class="c">'+parts[2]+'</span>'+(parts[3]||'')):k.value;h+='<div class="kpi-card"><div class="kpi-label">'+k.label+'</div><div class="kpi-value">'+dv+'</div><div class="kpi-note">'+k.note+'</div></div>';});h+='</div>';document.getElementById('main').innerHTML=h;}
(function(){var hash=window.location.hash.replace('#','');if(hash&&products[hash]){var btns=document.querySelectorAll('.product-btn');btns.forEach(function(b){if(b.getAttribute('onclick')&&b.getAttribute('onclick').indexOf("'"+hash+"'")>-1)b.classList.add('active');});renderProduct(hash);}else{var tamBtn=document.querySelector('.view-btn[onclick*="tam"]');if(tamBtn)tamBtn.classList.add('active');renderTAM();}})();
</script>
